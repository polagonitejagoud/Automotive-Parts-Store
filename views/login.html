<!DOCTYPE html>
<html>
<head>

    <title>Automotive Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            background:
            linear-gradient(
                rgba(255,255,255,0.15),
                rgba(255,255,255,0.15)
            ),
            url('/images/porsche-background.webp');

           background-size: cover;
            background-position:center;
            background-repeat:no-repeat;

        }

        .login-card{

            width:520px;

            padding:40px;

            border-radius:30px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,0.30);

            box-shadow:
                0 20px 50px rgba(0,0,0,.25);

            color:#111827;

            animation:floatCard 5s ease-in-out infinite;

        }

        @keyframes floatCard{

            0%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(-10px);
            }

            100%{
                transform:translateY(0);
            }

        }

        .logo{

            text-align:center;

            font-size:42px;

            margin-bottom:10px;

        }

        h1{

            text-align:center;

            font-weight:bold;

            letter-spacing:3px;

            color:#111827;

        }

        .subtitle{

            text-align:center;

            color:#374151;

            letter-spacing:2px;

            margin-bottom:35px;

            font-weight:600;

        }

        .form-label{

            color:#111827;

            font-weight:600;

        }

        .form-control{

            background:rgba(255,255,255,0.40);

            border:1px solid rgba(255,255,255,0.50);

            color:#111827;

            padding:14px;

        }

        .form-control::placeholder{

            color:#4B5563;

        }

        .form-control:focus{

            background:rgba(255,255,255,0.60);

            color:#111827;

            border-color:#111111;

            box-shadow:
            0 0 12px rgba(0,0,0,0.25);

        }

        .btn-login{

            width:100%;

            background:#111111;

            color:white;

            border:none;

            font-size:20px;

            font-weight:bold;

            padding:12px;

            border-radius:10px;

            transition:.3s;

        }

        .btn-login:hover{

            background:#333333;

            transform:scale(1.02);

            color:white;

        }

        .divider{

            text-align:center;

            color:#374151;

            margin:20px 0;

            font-weight:600;

        }

        .register-link{

            text-align:center;

            margin-top:20px;

            color:#111827;

            font-weight:500;

        }

        .register-link a{

            color:#111111;

            text-decoration:none;

            font-weight:bold;

        }

        .register-link a:hover{

            color:#000000;

        }

        @media(max-width:576px){

            .login-card{

                width:90%;

                padding:25px;

            }

            h1{
                font-size:30px;
            }

        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        🏎️
    </div>

    <h1>
        AUTOMOTIVE
    </h1>

    <h3 class="text-center">
        PARTS STORE
    </h3>

    <p class="subtitle">
        WHERE PERFORMANCE MEETS RELIABILITY
    </p>

    <form action="/auth/login" method="POST">

        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-login">

            LOGIN →

        </button>

        <div class="divider">
            OR
        </div>

        <div class="register-link">

            New User?

            <a href="/register">
                Register Here
            </a>

        </div>

    </form>

</div>

</body>
</html>
