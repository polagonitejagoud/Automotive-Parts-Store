<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Product Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link
rel="stylesheet"

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#C8CDD3;

font-family:'Segoe UI',sans-serif;

color:#111827;

}

/* NAVBAR */

.custom-navbar{

background:white;

border-bottom:1px solid #ddd;

padding:16px 0;

}

.navbar-brand{

font-size:32px;

font-weight:800;

color:#111827!important;

}

/* CARD */

.details-card{

background:white;

border-radius:20px;

padding:40px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

/* IMAGE */

.product-image{

width:100%;

height:430px;

object-fit:contain;

background:white;

border-radius:20px;

}

/* TEXT */

.product-title{

font-size:42px;

font-weight:800;

}

.price{

font-size:42px;

font-weight:bold;

color:#F59E0B;

}

.description{

margin-top:20px;

font-size:18px;

line-height:1.8;

color:#6B7280;

}

.stock{

font-size:18px;

font-weight:600;

color:#16A34A;

margin-top:15px;

}

.btn-dark{

background:#111111;

border:none;

font-weight:bold;

border-radius:10px;

padding:12px;

}

.btn-dark:hover{

background:#000;

}

.btn-outline-dark{

border-radius:10px;

font-weight:bold;

}

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar custom-navbar">

<div class="container">

<a class="navbar-brand" href="/products-page">

🚗 Automotive Store

</a>

<a href="/products-page" class="btn btn-outline-dark">

← Back to Products

</a>

</div>

</nav>

<div class="container py-5">

<div id="productDetails"></div>

★★★★★

}

document.getElementById("productDetails").innerHTML=`

<div class="details-card">

<div class="row">

<div class="col-lg-5 text-center">

<img
src="/uploads/${product.image}"
class="product-image">

</div>

<div class="col-lg-7">

<h1 class="product-title">

${product.name}

</h1>

${
discount>0
?

`<span class="badge bg-danger fs-6">

${discount}% OFF

</span>`

:""

}

<div class="mt-3">

${
discount>0
?

`

<h2 class="text-success fw-bold">

₹${discountedPrice}

</h2>

<h4>

/* ADD TO CART */

function addToCart(productId){

fetch("/cart/add",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

product_id:productId

})

})

.then(res=>res.text())

.then(msg=>{

alert(msg);

});

}

/* ADD TO WISHLIST */

function addToWishlist(productId){

fetch("/wishlist/add",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

product_id:productId

})

})

.then(res=>res.text())

.then(msg=>{

alert(msg);

});

}

</html>
