
<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    font-family:'Segoe UI',sans-serif;

    background:
    linear-gradient(
        rgba(255,255,255,0.15),
        rgba(255,255,255,0.15)
    ),
    url('/images/porsche-background.webp');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

}

        #introVideo{

            position:fixed;

            top:0;
            left:0;

            width:100%;
            height:100%;

            object-fit:cover;

            z-index:-2;

        }

        .overlay{

    position:fixed;

    inset:0;

    background:
    linear-gradient(
        rgba(0,0,0,.15),
        rgba(0,0,0,.25)
    );

    z-index:-1;

}

        .register-card{
    width:520px;

            padding:40px;

            border-radius:30px;

           background:rgba(255,255,255,0.15);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

           border:1px solid rgba(255,255,255,0.30);

            box-shadow:
    0 20px 50px rgba(0,0,0,.35);
            color:#111827;

animation:floatCard 3s ease-in-out infinite;
           

        }

        .register-card.show{

            opacity:1;

            transform:translateY(0);

        }

        .register-card h2{
    text-align:center;
    font-weight:900;
    font-size:56px;
    letter-spacing:2px;
    color:#111827;
    margin-bottom:0;
}

        .brand-text{

    text-align:center;

    color:#111827;

    font-weight:700;

    letter-spacing:4px;

    font-size:14px;

    margin-bottom:35px;

}


.form-control,
.form-select{

    background:rgba(255,255,255,0.45);

    border:1px solid rgba(255,255,255,0.55);

    color:#111827;

    padding:14px;

    border-radius:8px;

}

        .form-control::placeholder{

          color:#4B5563;

        }

        .form-control:focus,
.form-select:focus{

    background:rgba(255,255,255,0.60);

    color:#111827;

    border-color:#111111;

    box-shadow:
    0 0 12px rgba(0,0,0,.25);

}

.btn-register{

    width:100%;

    background:#000000;

    border:none;

    color:white;

    font-size:20px;

    font-weight:700;

    padding:12px;

    border-radius:8px;

    transition:.3s;

}



.btn-register:hover{

    background:#333333;

    color:white;

    transform:translateY(-2px);

}

        .login-link{

    text-align:center;

    margin-top:20px;

}

.login-link a{

    color:#111827;

    text-decoration:none;

    font-weight:600;

}

        .login-link a:hover{

    color:#333333;

}

        @media(max-width:576px){

    .register-card{

    width:520px;

    padding:40px;

    border-radius:30px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.30);

    box-shadow:0 20px 50px rgba(0,0,0,.25);

    color:#111827;

    animation:floatCard 5s ease-in-out infinite;

}

    .register-card h2{

        font-size:42px;

    }

}
        @keyframes floatCard{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0);
    }

}

    </style>

</head>

<body>



<div
class="register-card"
id="registerCard">

    <h2>
AUTOMOTIVE
</h2>

<h3 style="
text-align:center;
color:#111827;
margin-bottom:15px;
">
PARTS STORE
</h3>

    <p class="brand-text">
        PERFORMANCE STARTS HERE
    </p>

    <form
    action="/auth/register"
    method="POST">

        <div class="mb-3">

            <input
            type="text"
            name="name"
            class="form-control"
            placeholder="Enter Name"
            required>

        </div>

        <div class="mb-3">

            <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Enter Email"
            required>

        </div>

        <div class="mb-3">

            <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Enter Password"
            required>

        </div>

        <div class="mb-3">

            <select
            name="role"
            class="form-select">

                <option value="customer">
                    Customer
                </option>

            </select>

        </div>

        <button
        type="submit"
        class="btn btn-register">

            Register

        </button>

        <div class="login-link">

            <a href="/login">

                Already have an account? Login

            </a>

        </div>

    </form>

</div>

<script>

document
.getElementById("registerCard")
.classList.add("show");

</script>

</body>
</html>
